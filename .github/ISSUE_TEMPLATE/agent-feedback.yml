name: Agent Feedback
description: >
  Report an issue with a story generated by the cnv-grooming-agent.
  Use the link in the story description to pre-fill the context fields.
labels: ["agent-feedback"]
body:
  - type: input
    id: epic
    attributes:
      label: Source epic
      description: The Jira epic key this story was generated from
      placeholder: "e.g. CNV-86474"
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Story category
      description: "e.g. metrics, alerts, dashboards, docs, qe"
      placeholder: "metrics"
    validations:
      required: true

  - type: input
    id: run-id
    attributes:
      label: Agent run ID
      description: The run ID from the story description footer
      placeholder: "e.g. run-2026-05-05-abc123"
    validations:
      required: false

  - type: dropdown
    id: feedback-type
    attributes:
      label: Feedback type
      description: What kind of issue are you reporting?
      options:
        - Story was not needed (no real gap)
        - Wrong metric/alert name proposed
        - Story is a duplicate of existing work
        - Story scope is too broad or too narrow
        - Missing context or acceptance criteria
        - Epic was misunderstood by the agent
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: >
        Describe what is wrong and what you would expect instead.
        Include the story summary or Jira key if not already
        captured in the title.
      placeholder: "The agent proposed X but Y already exists..."
    validations:
      required: true
